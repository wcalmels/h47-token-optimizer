name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run extension:build

      - name: Package VSIX
        run: npm run extension:pack

      - name: Publish to Marketplace
        run: cd extensions/vscode && npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: h47-vscode-extension
          path: extensions/vscode/*.vsix

      - name: Attach VSIX to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" extensions/vscode/*.vsix --clobber
