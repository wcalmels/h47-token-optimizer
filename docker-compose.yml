services:
  api:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    volumes:
      - h47-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  h47-data:
